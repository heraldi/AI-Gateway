<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Gateway</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px; min-height: 420px;
      background: #0d1117; color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px;
    }

    header {
      background: #161b22; border-bottom: 1px solid #30363d;
      padding: 10px 14px; display: flex; align-items: center; gap: 8px;
    }
    header h1 { font-size: 14px; font-weight: 600; color: #58a6ff; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; margin-left: auto; flex-shrink: 0; }
    .dot.ok  { background: #3fb950; }
    .dot.err { background: #f85149; }

    .tabs { display: flex; background: #161b22; border-bottom: 1px solid #30363d; }
    .tab {
      flex: 1; padding: 8px; text-align: center; cursor: pointer;
      color: #8b949e; font-size: 12px; border: none; background: none;
      border-bottom: 2px solid transparent; transition: all .15s;
    }
    .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }

    .panel { padding: 14px; display: none; }
    .panel.active { display: block; }

    /* Current tab bar */
    .current-tab {
      display: flex; align-items: center; gap-8px;
      background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      padding: 8px 10px; margin-bottom: 12px; gap: 8px;
    }
    .tab-icon { font-size: 15px; flex-shrink: 0; }
    .tab-domain { font-size: 11px; color: #8b949e; font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Auto-extract toggle */
    .auto-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid #21262d; margin-bottom: 12px;
    }
    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #30363d; border-radius: 20px; transition: .2s; }
    .toggle-slider:before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .2s; }
    .toggle input:checked + .toggle-slider { background: #1f6feb; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }

    /* Provider list */
    .providers-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
    .provider-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 10px 12px; }
    .provider-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .provider-name { font-weight: 600; font-size: 12px; flex: 1; }
    .badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 500; }
    .badge-blue   { background: #1f3a5f; color: #58a6ff; }
    .badge-green  { background: #1a3a1a; color: #3fb950; }
    .badge-yellow { background: #3d2e00; color: #d29922; }
    .badge-gray   { background: #21262d; color: #8b949e; }
    .provider-url { font-size: 10px; color: #484f58; font-family: monospace; margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      padding: 6px 12px; border-radius: 5px; border: none; cursor: pointer;
      font-size: 11px; font-weight: 500; transition: all .15s; width: 100%;
    }
    .btn-push   { background: #238636; color: #fff; }
    .btn-push:hover { background: #2ea043; }
    .btn-push.same-domain { background: #1f6feb; }
    .btn-push.same-domain:hover { background: #388bfd; }
    .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .btn-secondary:hover { background: #30363d; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* Status message */
    .msg { padding: 7px 10px; border-radius: 5px; font-size: 11px; margin-top: 8px; display: none; }
    .msg.show { display: block; }
    .msg.ok  { background: #1a3a1a; color: #3fb950; border: 1px solid #238636; }
    .msg.err { background: #3a1a1a; color: #f85149; border: 1px solid #da3633; }

    .empty { text-align: center; color: #484f58; font-size: 12px; padding: 24px 0; }

    /* Settings */
    label { display: block; font-size: 11px; color: #8b949e; margin-bottom: 4px; margin-top: 12px; }
    label:first-of-type { margin-top: 0; }
    input { width: 100%; padding: 7px 10px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: 12px; outline: none; }
    input:focus { border-color: #58a6ff; }
    input[type="password"] { font-family: monospace; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
  </style>
</head>
<body>
  <header>
    <span>⚡</span>
    <h1>AI Gateway</h1>
    <div class="dot" id="statusDot"></div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="extract">Extract</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <!-- Extract -->
  <div class="panel active" id="tab-extract">
    <!-- Current tab info -->
    <div class="current-tab">
      <span class="tab-icon">🌐</span>
      <span class="tab-domain" id="currentDomain">Loading...</span>
    </div>

    <!-- Auto-extract -->
    <div class="auto-row">
      <div>
        <div style="font-size:12px;font-weight:500;">Auto-extract</div>
        <div style="font-size:11px;color:#8b949e;">Push cookies when page loads (domain match)</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="autoExtract" />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Provider list (dynamic) -->
    <div id="providersList" class="providers-list">
      <div class="empty">Loading providers…</div>
    </div>

    <div class="msg" id="extractMsg"></div>
  </div>

  <!-- Settings -->
  <div class="panel" id="tab-settings">
    <label>Gateway URL</label>
    <input type="text" id="gatewayUrl" placeholder="http://localhost:3000" />

    <label>Extension Token</label>
    <input type="password" id="extensionToken" placeholder="ext-token-change-me" />

    <label>Admin Password</label>
    <input type="password" id="adminPassword" placeholder="changeme123" />

    <button class="btn btn-secondary" id="btnSave" style="margin-top:14px">Save Settings</button>
    <div class="msg" id="settingsMsg"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
