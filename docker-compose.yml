version: '3.9'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-gateway:latest
    container_name: ai-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme123}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret}
      - EXTENSION_TOKEN=${EXTENSION_TOKEN:-ext-token-change-me}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-30}
    volumes:
      - gateway_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - gateway_net

  # Optional: nginx reverse proxy (uncomment for HTTPS on VPS)
  # nginx:
  #   image: nginx:alpine
  #   container_name: ai-gateway-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - gateway
  #   networks:
  #     - gateway_net

volumes:
  gateway_data:
    driver: local

networks:
  gateway_net:
    driver: bridge
